<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR CARs — RAG Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #1e293b;
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .logo {
            font-size: 24px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        header span {
            font-size: 13px;
            color: #94a3b8;
        }

        .mode-toggle {
            margin-left: auto;
            display: flex;
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .mode-toggle button {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-toggle button.active {
            background: #3b82f6;
            color: #fff;
        }

        .mode-toggle button:not(.active):hover {
            background: #1e293b;
            color: #e2e8f0;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 720px;
            line-height: 1.6;
            padding: 12px 16px;
            border-radius: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .message .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #334155;
            font-size: 12px;
            color: #94a3b8;
        }

        .message .sources span {
            background: #334155;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 4px;
            font-size: 11px;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            color: #94a3b8;
            font-style: italic;
        }

        #input-area {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }

        #question-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        #question-input:focus {
            border-color: #3b82f6;
        }

        #question-input::placeholder {
            color: #64748b;
        }

        #send-btn {
            padding: 12px 24px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #2563eb;
        }

        #send-btn:disabled {
            background: #334155;
            cursor: not-allowed;
        }

        .error {
            color: #f87171;
            background: #1e293b;
            border: 1px solid #7f1d1d;
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">🚗</span>
        <div>
            <h1>HR CARs Assistant</h1>
            <span id="mode-subtitle">Ask anything about our dealership</span>
        </div>
        <div class="mode-toggle">
            <button id="mode-customer" class="active" onclick="switchMode('customer')">Customer</button>
            <button id="mode-employee" onclick="switchMode('employee')">Employee</button>
        </div>
    </header>

    <div id="chat-container">
        <div class="message assistant">Hello! I'm the HR CARs assistant. Ask me anything about our dealership — vehicles, policies, sales process, and more.</div>
    </div>

    <div id="input-area">
        <input type="text" id="question-input" placeholder="Type your question..." autocomplete="off" />
<button id="send-btn">Send</button>
    </div>

    <script>
        const API_URL = "http://localhost:8000/ask";
        const chatContainer = document.getElementById("chat-container");
        const input = document.getElementById("question-input");
        const sendBtn = document.getElementById("send-btn");
        // Conversation history (last 3 exchanges sent to API)
        const conversationHistory = [];
        let currentMode = "customer";

        function switchMode(mode) {
            currentMode = mode;
            conversationHistory.length = 0;

            document.getElementById("mode-customer").classList.toggle("active", mode === "customer");
            document.getElementById("mode-employee").classList.toggle("active", mode === "employee");

            const subtitle = document.getElementById("mode-subtitle");
            subtitle.textContent = mode === "employee"
                ? "Internal employee assistant"
                : "Ask anything about our dealership";

            // Clear chat and show welcome message
            chatContainer.innerHTML = "";
            const greeting = mode === "employee"
                ? "Hello! I'm the HR CARs internal assistant. I can help with company policies, compensation, benefits, and all dealership information."
                : "Hello! I'm the HR CARs assistant. Ask me anything about our dealership — vehicles, policies, sales process, and more.";
            addMessage(greeting, "assistant");
        }

        function addMessage(text, role, sources) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = text;

            if (sources && sources.length > 0) {
                const srcDiv = document.createElement("div");
                srcDiv.className = "sources";
                srcDiv.innerHTML = "📄 Sources: " + sources.map(s => `<span>${s}</span>`).join(" ");
                div.appendChild(srcDiv);
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement("div");
            div.className = "typing-indicator";
            div.id = "typing";
            div.textContent = "Thinking...";
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById("typing");
            if (el) el.remove();
        }

        async function sendQuestion() {
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, "user");
            input.value = "";
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question,
                        mode: currentMode,
                        history: conversationHistory.slice(-3),
                    }),
                });

                removeTyping();

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    addMessage(err.detail || `Server error (${res.status})`, "assistant error");
                } else {
                    const data = await res.json();
                    addMessage(data.answer, "assistant", data.sources);
                    conversationHistory.push({ question, answer: data.answer });
                }
            } catch (e) {
                removeTyping();
                addMessage("Cannot reach the API server. Make sure it's running (python api.py).", "assistant error");
            }

            sendBtn.disabled = false;
            input.focus();
        }

        sendBtn.addEventListener("click", sendQuestion);

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") sendQuestion();
        });

        input.focus();
    </script>
</body>
</html>
